<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#ebe3d5"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#9a8c5e"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#ddd" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative border -->
  <rect x="30" y="30" width="1140" height="570" rx="4" ry="4" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <rect x="40" y="40" width="1120" height="550" rx="3" ry="3" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Wedding Rings - Big and Beautiful -->
  <!-- Left Ring -->
  <circle cx="560" cy="230" r="70" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <circle cx="560" cy="230" r="62" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="560" cy="230" r="78" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Left ring shine -->
  <ellipse cx="540" cy="200" rx="12" ry="4" fill="#c9a84c" opacity="0.3" transform="rotate(-30 540 200)"/>

  <!-- Right Ring -->
  <circle cx="640" cy="230" r="70" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <circle cx="640" cy="230" r="62" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="640" cy="230" r="78" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Right ring shine -->
  <ellipse cx="620" cy="200" rx="12" ry="4" fill="#c9a84c" opacity="0.3" transform="rotate(-30 620 200)"/>

  <!-- Diamond on right ring -->
  <polygon points="640,152 628,170 652,170" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>
  <line x1="628" y1="170" x2="652" y2="170" stroke="url(#gold)" stroke-width="2"/>
  <line x1="640" y1="152" x2="640" y2="170" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Sparkles -->
  <line x1="640" y1="138" x2="640" y2="145" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <line x1="625" y1="148" x2="630" y2="153" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <line x1="655" y1="148" x2="650" y2="153" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>

  <!-- Names -->
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="300" fill="#333" letter-spacing="4">
    Vasile
    <tspan fill="#9a8c5e" font-size="60" dx="15" dy="0">&amp;</tspan>
    <tspan fill="#333" dx="15">Victoria</tspan>
  </text>

  <!-- Decorative line -->
  <line x1="420" y1="410" x2="780" y2="410" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>

  <!-- Date -->
  <text x="600" y="450" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#9a8c5e" letter-spacing="6">
    11 SEPTEMBRIE 2026
  </text>

  <!-- Small heart -->
  <path d="M600 480 Q600 472 593 472 Q586 472 586 480 Q586 488 600 498 Q614 488 614 480 Q614 472 607 472 Q600 472 600 480" fill="none" stroke="#9a8c5e" stroke-width="1.5"/>

  <!-- Leaf decorations - left -->
  <path d="M380 400 Q360 380 370 360" fill="none" stroke="#9a8c5e" stroke-width="1.5" opacity="0.4"/>
  <path d="M380 400 Q355 390 350 370" fill="none" stroke="#9a8c5e" stroke-width="1.5" opacity="0.3"/>

  <!-- Leaf decorations - right -->
  <path d="M820 400 Q840 380 830 360" fill="none" stroke="#9a8c5e" stroke-width="1.5" opacity="0.4"/>
  <path d="M820 400 Q845 390 850 370" fill="none" stroke="#9a8c5e" stroke-width="1.5" opacity="0.3"/>
</svg>

